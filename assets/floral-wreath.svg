<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="wcw" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <radialGradient id="wnavy" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#2C4A7C"/>
      <stop offset="100%" stop-color="#1B2A4A"/>
    </radialGradient>
    <radialGradient id="wmid" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#5B7FA5"/>
      <stop offset="100%" stop-color="#2C4A7C"/>
    </radialGradient>
    <radialGradient id="wlight" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#9FB6D0"/>
      <stop offset="100%" stop-color="#5B7FA5"/>
    </radialGradient>
    <linearGradient id="wleaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D6C8B4"/>
      <stop offset="100%" stop-color="#B3A188"/>
    </linearGradient>
  </defs>

  <circle cx="150" cy="150" r="112" fill="none" stroke="#1B2A4A" stroke-width="1.4" opacity="0.85"/>

  <g filter="url(#wcw)">
    <!-- top-left cluster -->
    <g transform="translate(52 60) rotate(-15)">
      <path d="M0 20 C 18 -6, 45 -8, 55 16 C 35 28, 12 30, 0 20 Z" fill="url(#wleaf)" opacity="0.85"/>
      <circle cx="14" cy="10" r="13" fill="url(#wnavy)"/>
      <circle cx="30" cy="4" r="9" fill="url(#wmid)"/>
      <circle cx="4" cy="0" r="7" fill="url(#wlight)"/>
    </g>
    <!-- top-right cluster -->
    <g transform="translate(220 55) rotate(15)">
      <path d="M0 20 C -18 -6, -45 -8, -55 16 C -35 28, -12 30, 0 20 Z" fill="url(#wleaf)" opacity="0.85"/>
      <circle cx="-14" cy="10" r="13" fill="url(#wnavy)"/>
      <circle cx="-30" cy="4" r="9" fill="url(#wmid)"/>
      <circle cx="-4" cy="0" r="7" fill="url(#wlight)"/>
    </g>
    <!-- bottom-left cluster -->
    <g transform="translate(55 235) rotate(20)">
      <path d="M0 -18 C 16 6, 42 8, 50 -12 C 32 -26, 12 -28, 0 -18 Z" fill="url(#wleaf)" opacity="0.8"/>
      <circle cx="12" cy="-8" r="10" fill="url(#wmid)"/>
      <circle cx="26" cy="-2" r="7" fill="url(#wlight)"/>
    </g>
    <!-- bottom-right cluster -->
    <g transform="translate(245 235) rotate(-20)">
      <path d="M0 -18 C -16 6, -42 8, -50 -12 C -32 -26, -12 -28, 0 -18 Z" fill="url(#wleaf)" opacity="0.8"/>
      <circle cx="-12" cy="-8" r="10" fill="url(#wnavy)"/>
      <circle cx="-26" cy="-2" r="7" fill="url(#wlight)"/>
    </g>
  </g>
</svg>
