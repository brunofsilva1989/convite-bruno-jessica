<svg viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="wc" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feComponentTransfer in="b"><feFuncA type="linear" slope="1"/></feComponentTransfer>
    </filter>
    <radialGradient id="navy" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#2C4A7C"/>
      <stop offset="100%" stop-color="#1B2A4A"/>
    </radialGradient>
    <radialGradient id="mid" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#5B7FA5"/>
      <stop offset="100%" stop-color="#2C4A7C"/>
    </radialGradient>
    <radialGradient id="light" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#9FB6D0"/>
      <stop offset="100%" stop-color="#5B7FA5"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D6C8B4"/>
      <stop offset="100%" stop-color="#B3A188"/>
    </linearGradient>
  </defs>

  <g filter="url(#wc)" opacity="0.95">
    <!-- leaves -->
    <path d="M20 40 C 60 10, 120 5, 150 45 C 115 55, 65 60, 20 40 Z" fill="url(#leaf)" opacity="0.85" transform="rotate(-10 80 40)"/>
    <path d="M10 90 C 55 60, 110 60, 140 100 C 100 115, 45 120, 10 90 Z" fill="url(#leaf)" opacity="0.8" transform="rotate(8 75 90)"/>
    <path d="M60 150 C 100 120, 150 125, 175 165 C 140 180, 90 182, 60 150 Z" fill="url(#leaf)" opacity="0.7" transform="rotate(-6 120 150)"/>
    <path d="M5 150 C 40 130, 75 135, 95 165 C 65 180, 30 178, 5 150 Z" fill="url(#leaf)" opacity="0.75"/>

    <!-- flower clusters: navy -->
    <g>
      <circle cx="70" cy="60" r="26" fill="url(#navy)"/>
      <circle cx="95" cy="45" r="18" fill="url(#navy)" opacity="0.9"/>
      <circle cx="50" cy="80" r="16" fill="url(#navy)" opacity="0.85"/>
    </g>
    <!-- flower clusters: mid blue -->
    <g>
      <circle cx="130" cy="80" r="22" fill="url(#mid)"/>
      <circle cx="155" cy="60" r="14" fill="url(#mid)" opacity="0.9"/>
      <circle cx="110" cy="110" r="15" fill="url(#mid)" opacity="0.85"/>
    </g>
    <!-- flower clusters: light blue -->
    <g>
      <circle cx="45" cy="120" r="20" fill="url(#light)"/>
      <circle cx="20" cy="100" r="13" fill="url(#light)" opacity="0.9"/>
      <circle cx="80" cy="140" r="17" fill="url(#light)" opacity="0.85"/>
    </g>

    <!-- scattered smaller blooms trailing away -->
    <circle cx="170" cy="130" r="10" fill="url(#mid)" opacity="0.7"/>
    <circle cx="190" cy="160" r="7" fill="url(#light)" opacity="0.6"/>
    <circle cx="30" cy="170" r="8" fill="url(#navy)" opacity="0.55"/>
    <circle cx="210" cy="190" r="5" fill="url(#light)" opacity="0.45"/>

    <!-- flower centers -->
    <circle cx="70" cy="60" r="6" fill="#FAFAF7" opacity="0.55"/>
    <circle cx="130" cy="80" r="5" fill="#FAFAF7" opacity="0.5"/>
    <circle cx="45" cy="120" r="5" fill="#FAFAF7" opacity="0.5"/>
  </g>
</svg>
